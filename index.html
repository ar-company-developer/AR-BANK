<title>AR Bank - Geometric Grid Loading</title>
<script>
function isMobileDevice(){const u=navigator.userAgent||navigator.vendor||window.opera;return/android|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(u)}
if(!isMobileDevice()&&typeof window.Telegram==='undefined'){document.body.style.display='none';const b=document.createElement('div');b.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#000;color:#fff;display:flex;justify-content:center;align-items:center;z-index:99999;';b.innerHTML='<h2>Доступ заборонено</h2>';document.body.appendChild(b);throw new Error("Desktop access blocked")}
</script>
<style>
:root{--bg:#ffffff;--accent:#0066FF;--glow:rgba(0,102,255,0.3);--text:#000000;--logo-glass:rgba(0,0,0,0.05);--logo-border:rgba(0,0,0,0.1);--particle-size:6px}
body.dark-mode{--bg:#000000;--accent:#0066FF;--glow:rgba(0,102,255,0.5);--text:#ffffff;--logo-glass:rgba(255,255,255,0.03);--logo-border:rgba(255,255,255,0.1)}
html,body{margin:0;padding:0;height:100vh;width:100vw;background-color:var(--bg);display:flex;justify-content:center;align-items:center;overflow:hidden;transition:background-color 0.4s ease}
.main-wrapper{display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.scene{position:relative;width:300px;height:200px;display:grid;place-items:center;margin-bottom:10px}
.central-logo{grid-area:1/1;width:65px;height:65px;z-index:100;opacity:0;background:var(--logo-glass);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:12px;border:1px solid var(--logo-border);padding:10px;box-shadow:0 0 20px var(--glow);animation:logo-fade-in 1s ease-out forwards;animation-delay:1.2s;color:var(--accent)}
.particle{grid-area:1/1;width:var(--particle-size);height:var(--particle-size);background:var(--accent);border-radius:1.5px;opacity:0;box-shadow:0 0 6px var(--glow);will-change:transform,opacity;animation:fast-assemble-grid 2.5s cubic-bezier(0.19,1,0.22,1) forwards}
h1{position:relative;font-size:1.8rem;font-weight:1000;letter-spacing:5px;text-transform:uppercase;color:var(--text);opacity:0;z-index:110;margin-top:0;margin-left:10px;animation:fade-in-title 0.8s ease-out forwards;animation-delay:1.8s;transition:color 0.4s ease}
@keyframes fast-assemble-grid{0%{opacity:0;transform:translate(var(--start-x),var(--start-y)) scale(0) rotate(0deg)}20%{opacity:1}70%,100%{opacity:1;transform:translate(var(--end-x),var(--end-y)) scale(1) rotate(var(--target-rot))}}
.version {font-family: 'Inter', sans-serif;font-size: 0.8rem;color: gray;letter-spacing: 2px;margin-top: 10px;opacity: 0;animation: fade-in-version 0.8s ease-out forwards;animation-delay: 2.2s; }
@keyframes fade-in-version {from { opacity: 0; }to { opacity: 1; }}
@keyframes logo-fade-in{from{opacity:0;transform:scale(0.8) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes fade-in-title{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<script>
if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark-mode');
function initHighDetailGridLayout(){const c=document.getElementById('particles-container');const pC=40;for(let i=0;i<pC;i++){const p=document.createElement('div');p.className='particle';const cols=8,rows=5,col=i%cols,row=Math.floor(i/cols),sX=16,sY=22;const eX=(col-(cols-1)/2)*sX+'px',eY=(row-(rows-1)/2)*sY+'px';const sA=Math.random()*Math.PI*2,sD=500+Math.random()*200;const tR=(sA*180/Math.PI)+90+'deg';p.style.setProperty('--start-x',Math.cos(sA)*sD+'px');p.style.setProperty('--start-y',Math.sin(sA)*sD+'px');p.style.setProperty('--end-x',eX);p.style.setProperty('--end-y',eY);p.style.setProperty('--target-rot',tR);p.style.animationDelay=(i*0.03)+'s';c.appendChild(p)}}
initHighDetailGridLayout();
</script>
