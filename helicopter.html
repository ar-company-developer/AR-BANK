<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Досягнення - AR BANK</title>
    <link rel="stylesheet" href="card.css">
    <style>
        :root {
            --gold: #ffcc00;
            --gold-gradient: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background: radial-gradient(circle at top, #1a1a1a, #0a0a0a);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 25px;
            box-sizing: border-box;
            text-align: center;
        }
        .header-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .back-btn {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 45px; height: 45px;
            border-radius: 15px;
            font-size: 20px;
            cursor: pointer;
        }
        .progress-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            padding: 40px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .counter-box {
            position: relative;
            width: 140px; height: 140px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center; justify-content: center;
        }
        .counter-box svg {
            position: absolute;
            transform: rotate(-90deg);
            width: 100%; height: 100%;
        }
        .counter-box circle {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
        }
        #countText {
            font-size: 32px;
            font-weight: 800;
            color: var(--gold);
        }
        .heli-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 30px;
        }
        .heli-slot {
            aspect-ratio: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            display: flex;
            align-items: center; justify-content: center;
            transition: 0.4s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .heli-slot.active {
            background: var(--gold-gradient);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
            border: none;
        }
        .reward-info {
            background: rgba(255, 204, 0, 0.05);
            border: 1px dashed var(--gold);
            border-radius: 25px;
            padding: 20px;
            margin-top: 20px;
        }
        .main-btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: #333;
            color: #777;
            font-size: 18px;
            font-weight: 700;
            margin-top: 50px;
            cursor: not-allowed;
            transition: 0.3s;
        }
        .main-btn.active {
            background: var(--gold-gradient);
            color: black;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(184, 134, 11, 0.4);
        }
        .main-btn.active:hover { transform: translateY(-3px); }
        .main-btn:disabled { opacity: 0.6; }
        @keyframes rain {
            0% { transform: translateY(-10vh) rotate(0); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        .money {
            position: fixed; top: -50px;
            font-size: 24px; z-index: 999;
            pointer-events: none;
            animation: rain 3s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-nav">
            <button class="back-btn" onclick="location.href='card.html'">‹</button>
            <h2 style="margin:0; font-weight: 600;">AR Gift</h2>
            <div style="width:45px"></div>
        </div>
        <div class="progress-card">
            <div class="counter-box">
                <svg>
                    <circle cx="70" cy="70" r="62" stroke="rgba(255,255,255,0.1)"></circle>
                    <circle id="progressCircle" cx="70" cy="70" r="62" stroke="#ffcc00" stroke-dasharray="390" stroke-dashoffset="390"></circle>
                </svg>
                <div id="countText">0/5</div>
            </div>
            <h3 style="margin-bottom: 5px;">Полювання на гелікоптери</h3>
            <p style="color: #888; font-size: 14px;">Знайдіть усі 5 прихованих гелікоптерів</p>
            <div class="heli-grid" id="heliGrid"></div>
        </div>
        <div class="reward-info" id="rewardPanel">
            <h4 style="margin:0; color: var(--gold);">ГОЛОВНИЙ ПРИЗ</h4>
            <div style="font-size: 28px; font-weight: 800; margin: 10px 0;">5 000 €</div>
            <p style="font-size: 12px; color: #aaa;">+ значок гелікоптера біля імені в меню налаштувань</p>
        </div>
        <button class="main-btn" id="claimBtn" disabled>Недостатньо гелікоптерів</button>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
        import { getDatabase, ref, onValue, update, runTransaction, get } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyCxfUZl7STcdC53SSogfbVc-4dIijVEbLg",
            authDomain: "ar-bank-dbfd9.firebaseapp.com",
            databaseURL: "https://ar-bank-dbfd9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ar-bank-dbfd9",
            storageBucket: "ar-bank-dbfd9.firebasestorage.app",
            messagingSenderId: "635449421773",
            appId: "1:635449421773:web:bc7261cc5a4238c3649e84"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        onAuthStateChanged(auth, user => {
            if (user) {
                const userRef = ref(db, `user/${user.uid}`);
                onValue(userRef, (snapshot) => {
                    const data = snapshot.val();
                    const count = data.helicopter || 0;
                    const claimed = data.reward_claimed || false;
                    syncUI(count, claimed, user.uid);
                });
            } else {
                window.location.href = "login.html";
            }
        });
        function syncUI(count, claimed, uid) {
            const total = 5;
            document.getElementById('countText').innerText = `${count}/${total}`;
            const offset = 390 - (count / total * 390);
            document.getElementById('progressCircle').style.strokeDashoffset = offset;
            const grid = document.getElementById('heliGrid');
            grid.innerHTML = '';
            for(let i=1; i<=total; i++) {
                grid.innerHTML += `<div class="heli-slot ${i <= count ? 'active' : ''}">
                    <svg fill="#000000" version="1.1" id="Capa_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="25px" height="25px" viewBox="0 0 478.874 478.874" xml:space="preserve"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <g> <g> <path d="M471.023,161.491H306.166v-15.699h-31.402v15.699H94.205c-4.344,0-7.851,3.513-7.851,7.851 c0,4.34,3.506,7.851,7.851,7.851h180.559v8.908c-10.628,0.644-21.159,2.082-30.749,4.831c0,0-3.274,2.292,2.612,4.254 l-11.116,20.929l-157.658,9.161c0,0-34.676-58.226-45.791-73.597C20.937,136.308,0,150.045,0,150.045l18.314,56.264L4.907,229.531 l-0.331,7.851l13.738,12.427c0,0-1.311,12.106-2.944,17.332c-1.633,5.238,14.068,7.851,24.862,9.161l34.997-32.38l142.619,6.54 c0,0,54.506,34.336,80.467,39.281V318.5h15.701v-27.747c14.258,0.637,38.23,1.779,63.293,1.374l-0.493,26.373v0.061l-94.019-0.061 c-4.34,0-7.942,3.511-7.942,7.851s3.427,7.851,7.767,7.851h98.322c0.966,0.104,2.974,0.276,5.646,0.276 c8.283,0,22.91-1.659,32.315-12.175c7.27-8.118,9.782-19.452,7.566-33.687c26.365-3.902,46.987-11.645,49.135-26.381 c0,0-7.851-48.734-94.855-54.951l-27.487-14.722c0,0-20.902-4.628-47.099-6.299v-9.071h164.857c4.34,0,7.851-3.511,7.851-7.851 C478.874,165.003,475.363,161.491,471.023,161.491z M45.791,249.808c-10.84,0-19.626-8.784-19.626-19.626 c0-10.84,8.786-19.626,19.626-19.626c10.84,0,19.626,8.786,19.626,19.626C65.417,241.024,56.631,249.808,45.791,249.808z M407.237,311.799c-3.711,4.184-9.706,5.947-15.057,6.624l0.108,4.437l-15.473-0.405v-0.032l15.473,0.438v-4.469l0.621-26.733 h-0.032c6.035-0.276,12.031-0.641,17.886-1.17C412.342,300.013,411.256,307.275,407.237,311.799z M464.996,259.137 c0,0-17.837,24.241-30.32,9.161l-21.396-44.641C413.264,223.658,454.288,226.319,464.996,259.137z"></path> </g> </g> </g></svg>
                </div>`;
            }
            const btn = document.getElementById('claimBtn');
            if (claimed) {
                btn.innerText = "ВИНОГОРОДУ ОТРИМАНО";
                btn.disabled = true;
                btn.classList.remove('active');
            } else if (count >= total) {
                btn.innerText = "ЗАБРАТИ 5000 €";
                btn.classList.add('active');
                btn.disabled = false;
                btn.onclick = () => claimReward(uid);
            } else {
                btn.innerText = `Знайдіть ще ${total - count}`;
            }
        }
        async function claimReward(uid) {
            const cardRef = ref(db, `user/${uid}/card`);
            const userRef = ref(db, `user/${uid}`);
            for(let i=0; i<30; i++) {
                setTimeout(createMoney, i * 100);
            }
            try {
                await runTransaction(cardRef, (card) => {
                    if (card) {
                        card.balance = (card.balance || 0) + 5000;
                    }
                    return card;
                });
                await update(userRef, {
                    reward_claimed: true,
                    vip: true,
                    style_id: 'class3' 
                });
                alert("Успішно!");
                window.location.href = "card.html";

            } catch (e) {
                alert("Помилка: " + e.message);
            }
        }
        function createMoney() {
            const m = document.createElement('div');
            m.className = 'money';
            m.innerText = '€';
            m.style.left = Math.random() * 100 + 'vw';
            m.style.color = '#ffcc00';
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 3000);
        }
    </script>
</body>
</html>
