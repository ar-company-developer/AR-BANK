<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="pin_page_title">Встановіть новий PIN - AR BANK</title>
<script>(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark-mode');})();</script>
<link rel="stylesheet" href="pin.css">
<style>
    /* Стиль для гелікоптера біля тексту */
    .heli-wrapper {
        position: relative;
        display: inline-block;
        vertical-align: middle;
        margin-left: 10px;
    }
    
    .hidden-helicopter {
        cursor: pointer;
        opacity: 0.4;
        transition: all 0.5s ease;
        color: var(--primary-color, #4f46e5);
        display: none; /* Керується через JS */
    }

    .dark-mode .hidden-helicopter {
        color: #818cf8;
        opacity: 0.3;
    }

    .hidden-helicopter:hover {
        opacity: 1;
        transform: scale(1.2) rotate(-10deg);
    }

    /* Анімація відльоту */
    .heli-fly-away {
        pointer-events: none;
        transform: translateY(-500px) translateX(300px) rotate(45deg) scale(0) !important;
        opacity: 0 !important;
        transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
</style>
<script type="module" src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js"></script>
<script type="module" src="https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js"></script>
<script type="module" src="pin10.js"></script>
</head>
<body>
<audio id="clickSound" preload="auto"><source src="click.mp3" type="audio/mpeg"></audio>

<div class="pin-container">
    <h1 class="main-title">
        <span data-i18n="pin_title_new">Новий PIN</span>
        <div class="heli-wrapper">
            <div id="heli-2" class="hidden-helicopter" onclick="collectHelicopter(2)">
                <svg viewBox="0 0 128 128" width="28" height="28">
                    <path d="M82.02 119.67c-.33-.05-5.51-.07-12.62-.07l-4.69-15.5l-4.27 1.11l4.02 14.39c-8.29 0-18.04 0-25.81-.01l4.72-14.23H38.3l-4.64 14.22c-4.98-.01-8.42-.03-8.88-.07-1.9-.16-4.19-1.58-5.14-2.13-.95-.55-2.69-2.77-4.35-.95-1.66 1.82 1.2 4.05 3.16 5.3 2.85 1.82 6.09 1.98 7.99 1.98 1.9 0 55.03.08 55.74 0s1.66-1.19 1.66-1.98-.57-1.88-1.82-2.06z" fill="currentColor"/>
                    <path d="M103.92 47.96c-.71-.08-42.77-.71-42.77-.71s-.97-1.51-3.6-2.23c2.13-.1 3.75-.26 3.84-.45.63-1.42-2.45-3.79-7.27-3.87-4.51-.07-7.75 2.29-7.35 4.03.06.26 2.02.38 4.49.41-2.55.79-3.7 2.28-3.7 2.28S6.28 49.07 5.09 49.15s-2.13.47-2.13 1.42.55 1.74 1.58 1.74 40-1.42 40-1.42s-17.95 5.06-19.05 5.38c-1.11.32-2.53.71-2.37 1.66.16.95 1.58.87 2.45.63s25.77-6.4 25.77-6.4v6.87c-2.12-.01-3.86.05-4.11.24-.75.58-1.49 3.31-1.82 5.69-.4 2.85-.47 5.85-.47 5.85l10.91.63l4.27-12.18s-1.04-.05-2.53-.1v-6.54s26.64 6.8 27.35 6.96c.71.16 1.9.08 1.98-.63.08-.71-.08-1.34-1.03-1.74s-21.5-6.25-21.5-6.25s37.24 0 38.9-.08c1.66-.08 2.13-.55 2.13-1.5 0-.94-.79-1.34-1.5-1.42z" fill="currentColor"/>
                    <path d="M16.64 89.07l-2.21 2.06l-3 4.27s-1.5 3.95 3.32 6.96c4.82 3 10.91 5.3 31.94 4.82 21.03-.47 30.2-4.51 34.15-9.41 3.95-4.9 4.27-9.17 4.27-9.17l6.56-6.32l14.31.24s5.38 14.71 5.53 15.02c.16.32 3.87.32 3.87.32l2.77-7.83s-.4-8.78-.16-9.72c.24-.95 7.27-22.93 7.12-23.72s-.31-.83-.86-.86c-.55-.04-1.98.04-1.98.04l-14.4 15.33l-1.14 2.61l-2.87.47l-20.98-1.74s0-1.8-.53-3.41c-.53-1.6-1.94-4.28-1.94-4.28l-29.35 1.91l-2.05 3.17l-9.82 5.08l-22.55 14.16z" fill="currentColor"/>
                </svg>
            </div>
        </div>
    </h1>
    
    <p class="subtitle" data-i18n="pin_subtitle_new">введіть свій новий пін-код</p>
    
    <div class="pin-indicators" id="pinIndicators">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    
    <div id="error-message" class="error-message" style="display:none;" data-i18n="pin_success_change">PIN-код успішно змінено!</div>
    
    <div class="keypad" id="keypad">
        <div class="key-row">
            <button class="key" onclick="playClick()" data-value="1">1</button>
            <button class="key" onclick="playClick()" data-value="2">2</button>
            <button class="key" onclick="playClick()" data-value="3">3</button>
        </div>
        <div class="key-row">
            <button class="key" onclick="playClick()" data-value="4">4</button>
            <button class="key" onclick="playClick()" data-value="5">5</button>
            <button class="key" onclick="playClick()" data-value="6">6</button>
        </div>
        <div class="key-row">
            <button class="key" onclick="playClick()" data-value="7">7</button>
            <button class="key" onclick="playClick()" data-value="8">8</button>
            <button class="key" onclick="playClick()" data-value="9">9</button>
        </div>
        <div class="key-row">
            <div class="key placeholder"></div>
            <button class="key" onclick="playClick()" data-value="0">0</button>
            <button class="key delete-key" onclick="playClick()" data-action="delete">
                <svg viewBox="0 0 16 16" fill="none" width="24" height="24"><path fill-rule="evenodd" clip-rule="evenodd" d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM4.29289 5.70711L6.58579 8L4.29289 10.2929L5.70711 11.7071L8 9.41421L10.2929 11.7071L11.7071 10.2929L9.41421 8L11.7071 5.70711L10.2929 4.29289L8 6.58579L5.70711 4.29289L4.29289 5.70711Z" fill="currentColor"/></svg>
            </button>
        </div>
    </div>
</div>

<script src="translate.js"></script>
<script>function playClick(){const s=document.getElementById('clickSound').cloneNode(true);s.play();}</script>
</body>
</html>
