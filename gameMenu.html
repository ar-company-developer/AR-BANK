<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Ігри AR Bank</title><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet"><script>(function(){const e=localStorage.getItem("theme");if(e==="dark"||!e)document.documentElement.classList.add("dark-mode");else document.documentElement.classList.remove("dark-mode")})()</script><style>:root{--bg:#f9f9f9;--text:#000;--shadow:rgba(163,177,198,0.6);--light-shadow:rgba(255,255,255,0.7);--card-shadow:rgba(0,0,0,0.15);--sub-text:rgba(0,0,0,0.6)}html.dark-mode{--bg:rgb(35,35,35);--light-shadow:rgba(255,255,255,0.05);--shadow:rgba(0,0,0,0.5);--text:#fff;--card-shadow:rgba(0,0,0,0.5);--sub-text:rgba(255,255,255,0.6)}html,body{margin:0;padding:0;font-family:'Montserrat',sans-serif;height:100%;background:var(--bg);color:var(--text);transition:.3s}header{padding:20px;text-align:center;font-size:1.8rem;font-weight:700}#games-list{display:flex;flex-direction:column;gap:20px;padding:20px}.game-card{margin-top:50px;position:relative;width:100%;height:220px;border-radius:25px;overflow:hidden;background-size:cover;background-position:center;display:flex;align-items:flex-end;box-shadow:0 10px 30px var(--card-shadow);transition:.3s;cursor:pointer}.game-card::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to top,rgba(0,0,0,0.8)0%,rgba(0,0,0,0.4)40%,transparent 100%);z-index:1}.game-info{position:relative;z-index:2;width:100%;padding:20px;display:flex;justify-content:space-between;align-items:center}.game-text{display:flex;flex-direction:column}.game-info span{font-weight:700;font-size:1.4rem;color:#fff;margin-bottom:4px}.game-info small{color:rgba(255,255,255,0.7);font-size:.9rem}.game-info button{padding:12px 35px;background:#d4ff70;border:none;border-radius:18px;font-weight:700;font-size:1rem;color:#000;cursor:pointer;transition:.3s;box-shadow:0 4px 15px rgba(212,255,112,0.3)}.game-info button:hover{background:#e4ff99;transform:scale(1.05)}.btn-back{position:absolute;top:20px;left:20px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg);box-shadow:3px 3px 6px var(--shadow),-3px -3px 6px var(--light-shadow);z-index:20;color:#d4ff70;transition:0.2s;text-decoration:none}</style></head><body><header></header><a href="card.html" class="btn-back"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg></a><div id="games-list"><div class="game-card" style="background-image:url('money-card.png')"><div class="game-info"><div class="game-text"><span>Money Sorter</span><small>Money</small></div><button onclick="location.href='game.html'">Play</button></div></div></div></body></html>
