<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Історія транзакцій</title>
<script>(function(){const t=localStorage.getItem('theme');if(t==='dark'){document.documentElement.classList.add('dark-mode')}else{document.documentElement.classList.remove('dark-mode')}})();</script>
<script type="module" src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js"></script>
<script type="module" src="https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js"></script>
<script type="module" src="https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js"></script>
<style>
:root{--background-color:#ffffff;--header-bg:#ffffff;--card-background:#ffffff;--text-color:#333333;--text-secondary:#888888;--income-color:#28a745;--expense-color:#dc3545;--shadow-color:rgba(0,0,0,0.05);--border-color:#eeeeee;--modal-overlay:rgba(0,0,0,0.5)}
html.dark-mode{--background-color:#121212;--header-bg:#1a1a1a;--card-background:#1e1e1e;--text-color:#f0f0f0;--text-secondary:#aaaaaa;--income-color:#4cd137;--expense-color:#ff4757;--shadow-color:rgba(0,0,0,0.3);--border-color:#333333;--modal-overlay:rgba(0,0,0,0.8)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background-color:var(--background-color);margin:0;padding:0;color:var(--text-color);display:flex;flex-direction:column;align-items:center;transition:background-color .3s,color .3s}
.container{width:100%;max-width:600px;padding:20px;box-sizing:border-box}
.header{display:flex;align-items:center;padding:15px;background:var(--header-bg);box-shadow:0 1px 3px var(--shadow-color);width:100%;box-sizing:border-box;max-width:600px}
.back-icon{display:flex;align-items:center;padding-right:20px;color:var(--text-color);text-decoration:none}
.page-title{font-size:20px;font-weight:700;margin:0;flex-grow:1;text-align:center;padding-right:44px;color:var(--text-color)}
#historyList{list-style:none;padding:0;margin:20px 0 0 0}
.transaction-item{display:flex;justify-content:space-between;align-items:center;background-color:var(--card-background);padding:15px;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 5px var(--shadow-color);border:none;cursor:pointer;width:100%;text-align:left;outline:none;font-family:inherit}
.transaction-item:active{transform:scale(0.98)}
.details{flex-grow:1}
.description{font-weight:600;font-size:16px;color:var(--text-color)}
.timestamp{font-size:12px;color:var(--text-secondary);margin-top:4px}
.amount{font-weight:700;font-size:18px;padding-left:15px;white-space:nowrap}
.amount.income{color:var(--income-color)}
.amount.expense{color:var(--expense-color)}
.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background-color:var(--modal-overlay);justify-content:center;align-items:center;padding:20px;box-sizing:border-box;backdrop-filter:blur(5px);opacity:0;transition:opacity .3s ease}
.modal.show{opacity:1}
.modal-content{background-color:var(--card-background);padding:25px;border-radius:24px;width:100%;max-width:380px;position:relative;box-shadow:0 20px 40px rgba(0,0,0,0.3);text-align:center;transform:scale(0.7);transition:transform .3s cubic-bezier(0.34,1.56,0.64,1)}
.modal.show .modal-content{transform:scale(1)}
.close-modal{position:absolute;right:20px;top:20px;font-size:28px;line-height:1;cursor:pointer;color:var(--text-secondary)}
.receipt-header{border-bottom:2px dashed var(--border-color);padding-bottom:15px;margin-bottom:20px}
.receipt-title{font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-secondary)}
.receipt-img{width:70px;height:70px;object-fit:cover;border-radius:18px;margin-bottom:15px}
.receipt-row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:14px;position:relative}
.receipt-label{color:var(--text-secondary)}
.receipt-value{font-weight:600;text-align:right}
.receipt-amount{font-size:32px;font-weight:800;margin-bottom:25px;letter-spacing:-0.5px}
.btn-close-receipt{margin-top:20px;background:var(--text-color);color:var(--background-color);border:none;padding:14px 20px;border-radius:14px;width:100%;font-weight:700;font-size:16px;cursor:pointer}
#statusMessage,#emptyMessage{text-align:center;margin-top:50px;color:var(--text-secondary)}
.receipt-comment{background:var(--background-color);border-radius:12px;padding:12px;margin-top:15px;font-size:14px;text-align:left;border:1px solid var(--border-color);word-break:break-word}
.comment-label{display:block;font-size:11px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:4px;font-weight:700}
.hidden-helicopter{position:absolute;left:-20px;top:0;cursor:pointer;z-index:99;opacity:.3;transition:all .5s ease;color:var(--text-color);display:none}
.hidden-helicopter:hover{opacity:1;transform:scale(1.3) rotate(-10deg)}
.heli-fly-away{pointer-events:none;transform:translateY(-400px) translateX(200px) rotate(45deg) scale(0)!important;opacity:0!important}
</style>
</head>
<body>
<div class="header">
<a href="card.html" class="back-icon"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></a>
<h1 class="page-title">Історія</h1>
</div>
<div class="container">
<div id="statusMessage">Завантаження історії...</div>
<div id="emptyMessage" style="display:none">Історія транзакцій відсутня.</div>
<div id="historyList"></div>
</div>
<div id="receiptModal" class="modal">
<div class="modal-content">
<span class="close-modal" id="closeModalIcon">&times;</span>
<div class="receipt-header"><div class="receipt-title">Квитанція</div></div>
<div id="receiptBody"></div>
<button class="btn-close-receipt" id="closeBtnAction">Закрити</button>
</div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";import{getDatabase,ref,onValue,set,runTransaction}from"https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";const c={apiKey:"AIzaSyCxfUZl7STcdC53SSogfbVc-4dIijVEbLg",authDomain:"ar-bank-dbfd9.firebaseapp.com",databaseURL:"https://ar-bank-dbfd9-default-rtdb.europe-west1.firebasedatabase.app",projectId:"ar-bank-dbfd9"};const a=initializeApp(c);const d=getDatabase(a);const h=getAuth(a);const m=document.getElementById('receiptModal');const rb=document.getElementById('receiptBody');let isH4=false;window.collectHelicopter=async function(i){const u=h.currentUser;if(!u)return;const e=document.getElementById(`heli-${i}`);if(!e||e.classList.contains('heli-fly-away'))return;e.classList.add('heli-fly-away');try{await set(ref(d,`user/${u.uid}/collected_heli/${i}`),true);await runTransaction(ref(d,`user/${u.uid}/helicopter`),v=>(v||0)+1);setTimeout(()=>e.remove(),600)}catch(x){e.classList.remove('heli-fly-away')}};const hm=()=>{m.classList.remove('show');setTimeout(()=>{m.style.display='none'},300)};document.getElementById('closeModalIcon').onclick=hm;document.getElementById('closeBtnAction').onclick=hm;window.onclick=(e)=>{if(e.target==m)hm()};function fD(t){return t?new Date(t).toLocaleDateString('uk-UA',{day:'numeric',month:'long',year:'numeric'}):'---'}function fT(t){return t?new Date(t).toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'}):'--:--'}function oR(t,ds){const inc=t.amount>0;const ac=inc?'income':'expense';const s=inc?'+':'';const ch=t.comment?`<div class="receipt-comment"><span class="comment-label">Коментар</span>${t.comment}</div>`:'';rb.innerHTML=`<img src="money.png" class="receipt-img" onerror="this.style.display='none'"><div class="receipt-amount ${ac}">${s}${t.amount.toFixed(0)} ${t.currency||'€'}</div><div class="receipt-row"><span class="receipt-label">Призначення</span><span class="receipt-value">${ds}</span></div><div class="receipt-row"><span class="receipt-label">Дата</span><span class="receipt-value">${fD(t.timestamp)}</span></div><div class="receipt-row"><span class="receipt-label">Час</span><span class="receipt-value">${fT(t.timestamp)}</span></div><div class="receipt-row"><div id="heli-4" class="hidden-helicopter" style="${isH4?'display:none':'display:block'}" onclick="collectHelicopter(4)"><svg viewBox="0 0 128 128" width="20" height="20"><path d="M82.02 119.67c-.33-.05-5.51-.07-12.62-.07l-4.69-15.5l-4.27 1.11l4.02 14.39c-8.29 0-18.04 0-25.81-.01l4.72-14.23H38.3l-4.64 14.22c-4.98-.01-8.42-.03-8.88-.07c-1.9-.16-4.19-1.58-5.14-2.13c-.95-.55-2.69-2.77-4.35-.95c-1.66 1.82 1.2 4.05 3.16 5.3c2.85 1.82 6.09 1.98 7.99 1.98c1.9 0 55.03.08 55.74 0s1.66-1.19 1.66-1.98s-.57-1.88-1.82-2.06z" fill="currentColor"/><path d="M103.92 47.96c-.71-.08-42.77-.71-42.77-.71s-.97-1.51-3.6-2.23c2.13-.1 3.75-.26 3.84-.45c.63-1.42-2.45-3.79-7.27-3.87c-4.51-.07-7.75 2.29-7.35 4.03c.06.26 2.02.38 4.49.41c-2.55.79-3.7 2.28-3.7 2.28S6.28 49.07 5.09 49.15s-2.13.47-2.13 1.42s.55 1.74 1.58 1.74s40-1.42 40-1.42s-17.95 5.06-19.05 5.38c-1.11.32-2.53.71-2.37 1.66c.16.95 1.58.87 2.45.63s25.77-6.4 25.77-6.4v6.87c-2.12-.01-3.86.05-4.11.24c-.75.58-1.49 3.31-1.82 5.69c-.4 2.85-.47 5.85-.47 5.85l10.91.63l4.27-12.18s-1.04-.05-2.53-.1v-6.54s26.64 6.8 27.35 6.96c.71.16 1.9.08 1.98-.63c.08-.71-.08-1.34-1.03-1.74s-21.5-6.25-21.5-6.25s37.24 0 38.9-.08c1.66-.08 2.13-.55 2.13-1.5c0-.94-.79-1.34-1.5-1.42z" fill="currentColor"/><path d="M16.64 89.07l-2.21 2.06l-3 4.27s-1.5 3.95 3.32 6.96c4.82 3 10.91 5.3 31.94 4.82c21.03-.47 30.2-4.51 34.15-9.41c3.95-4.9 4.27-9.17 4.27-9.17l6.56-6.32l14.31.24s5.38 14.71 5.53 15.02c.16.32 3.87.32 3.87.32l2.77-7.83s-.4-8.78-.16-9.72c.24-.95 7.27-22.93 7.12-23.72s-.31-.83-.86-.86c-.55-.04-1.98.04-1.98.04l-14.4 15.33l-1.14 2.61l-2.87.47l-20.98-1.74s0-1.8-.53-3.41c-.53-1.6-1.94-4.28-1.94-4.28l-29.35 1.91l-2.05 3.17l-9.82 5.08l-22.55 14.16z" fill="#fff"/></svg></div><span class="receipt-label">ID транзакції</span><span class="receipt-value">#${Math.floor(1e8+Math.random()*9e8)}</span></div>${ch}<div class="receipt-row" style="margin-top:10px;border-top:1px solid var(--border-color);padding-top:10px"><span class="receipt-label">Статус</span><span class="receipt-value" style="color:var(--income-color)">Виконано</span></div>`;m.style.display='flex';void m.offsetWidth;m.classList.add('show')}function rH(ts){const hl=document.getElementById('historyList');hl.innerHTML='';if(!ts||Object.keys(ts).length===0){document.getElementById('emptyMessage').style.display='block';document.getElementById('statusMessage').style.display='none';return}document.getElementById('emptyMessage').style.display='none';document.getElementById('statusMessage').style.display='none';const sts=Object.values(ts).sort((a,b)=>b.timestamp-a.timestamp);const TC="4444 4444 4444 4444";sts.forEach(t=>{const inc=t.amount>0;const s=inc?'+':'';const ac=inc?'income':'expense';let ds=t.description||'Транзакція';if(inc&&ds.replace(/\s/g,'').includes(TC.replace(/\s/g,'')))ds='Поповнення';const b=document.createElement('button');b.className='transaction-item';b.onclick=()=>oR(t,ds);b.innerHTML=`<div class="details"><div class="description">${ds}</div><div class="timestamp">${fD(t.timestamp)}, ${fT(t.timestamp)}</div></div><div class="amount ${ac}">${s}${t.amount.toFixed(0)} ${t.currency||'€'}</div>`;hl.appendChild(b)})}onAuthStateChanged(h,(u)=>{if(u){onValue(ref(d,`user/${u.uid}/card/history`),(s)=>rH(s.val()));onValue(ref(d,`user/${u.uid}/collected_heli/4`),(s)=>{isH4=s.exists()&&s.val()===true})}else{document.getElementById('statusMessage').innerHTML='Ви не увійшли.'}});
</script>
</body>
</html>
