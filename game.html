<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Money Sorter Pro - AR Bank</title>
<script>(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark-mode')})();</script>
<style>  
:root{--bg:#e0e5ec;--text:#374151;--primary:#4f46e5;--uah:#f59e0b;--usd:#10b981;--white:#fff;--shadow:rgba(163,177,198,0.6);--light-shadow:rgba(255,255,255,0.7);--card-bg:#e0e5ec}  
html.dark-mode{--bg:#1a1d24;--text:#f9fafb;--primary:#818cf8;--shadow:rgba(0,0,0,0.5);--light-shadow:rgba(255,255,255,0.05);--card-bg:#1a1d24}  
body{margin:0;padding:0;font-family:'SF Pro Display',system-ui,sans-serif;background-color:var(--bg);color:var(--text);overflow:hidden;display:flex;flex-direction:column;align-items:center;height:100vh;touch-action:none;transition:background 0.3s}  
.header{width:100%;padding:15px 25px;display:flex;justify-content:space-between;box-sizing:border-box;z-index:5;position:absolute;top:50px}  
.stat-box{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--card-bg);border-radius:20px;box-shadow:4px 4px 8px var(--shadow),-4px -4px 8px var(--light-shadow);margin-right: 1px;}  
.stat-label{font-size:12px;text-transform:uppercase;opacity:0.7;letter-spacing:1px}
.stat-value{font-size:22px;font-weight:650;color:var(--primary)}  
#score.pop-anim{animation:popScore 0.3s ease}
@keyframes popScore{0%{transform:scale(1)}50%{transform:scale(1.3);color:var(--usd)}100%{transform:scale(1)}}  
.btn-back{position:absolute;top:20px;left:20px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--card-bg);box-shadow:3px 3px 6px var(--shadow),-3px -3px 6px var(--light-shadow);z-index:20;color:var(--primary);transition:0.2s;text-decoration:none}  
.zones{position:absolute;bottom:40px;width:100%;display:flex;justify-content:space-between;padding:0 30px;box-sizing:border-box;z-index:1}  
.zone{width:130px;height:130px;border-radius:30px;background:var(--card-bg);box-shadow:inset 5px 5px 10px var(--shadow),inset -5px -5px 10px var(--light-shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:14px;transition:0.3s;opacity:0.5;color:var(--text)}  
.zone svg{margin-bottom:10px;opacity:0.6}  
.zone.hover-uah{box-shadow:inset 5px 5px 10px var(--shadow),inset -5px -5px 10px var(--light-shadow), 0 0 20px rgba(245,158,11,0.4);opacity:1;color:var(--uah)}  
.zone.hover-usd{box-shadow:inset 5px 5px 10px var(--shadow),inset -5px -5px 10px var(--light-shadow), 0 0 20px rgba(16,185,129,0.4);opacity:1;color:var(--usd)}  
#money-card{width:260px;height:130px;background:var(--white);border-radius:20px;box-shadow:10px 10px 20px rgba(0,0,0,0.15);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);display:none;align-items:center;justify-content:center;cursor:grab;transition: transform 0.05s ease-out;z-index:10;border:1px solid rgba(255,255,255,0.2);overflow:hidden;transform-origin:center;transition:transform 0.05s ease-out, opacity 0.2s}  
.dark-mode #money-card{background:#2a303c;box-shadow:10px 10px 25px rgba(0,0,0,0.4)}  
#money-card.spawn-anim{animation:spawnBill 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards}  
@keyframes spawnBill{from{transform:translate(-50%,-50%) scale(0) rotate(-10deg);opacity:0}to{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1}}  
.bill-content{display:flex;align-items:center;gap:15px;width:100%;padding:0 20px;box-sizing:border-box}  
.bill-icon-circle{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(79,70,229,0.1)}  
.bill-details{display:flex;flex-direction:column;flex-grow:1}  
.bill-value{font-size:24px;font-weight:800;letter-spacing:-1px}  
.bill-label{font-size:10px;text-transform:uppercase;opacity:0.6;letter-spacing:1px;margin-top:2px}  
#start-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}  
.btn-start{padding:20px 50px;font-size:20px;font-weight:bold;color:var(--white);background:var(--primary);border:none;border-radius:20px;box-shadow:0 10px 20px rgba(79,70,229,0.3);margin-bottom:20px; cursor:pointer;transition:0.3s}  
.btn-start:active{transform:scale(0.95)}  
.btn-leader{padding:20px 50px;font-size:20px;font-weight:bold;color:var(--text);background:var(--bg);border:none;border-radius:20px;box-shadow:0 10px 20px rgba(79,70,229,0.3);margin-bottom:20px; cursor:pointer;transition:0.3s}  
.btn-leader:active{transform:scale(0.95)} 
.glare{position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(135deg,rgba(255,255,255,0) 30%,rgba(255,255,255,0.2) 50%,rgba(255,255,255,0) 70%);transform:rotate(0deg);pointer-events:none}
#leaderboard-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:120px;}
#leaderboard-screen h2{margin-bottom:20px;}
#leaderboard-list{width:80%;max-width:400px;max-height:60vh;overflow-y:auto;padding-right:5px;}
.leader-item{display:flex;justify-content:space-between;padding:15px 20px;margin-bottom:10px;
  border-radius:15px;background:var(--card-bg);box-shadow:4px 4px 10px var(--shadow),
    -4px -4px 10px var(--light-shadow);font-weight:bold;}
.leader-rank{opacity:0.6;}
.leader-score{color:var(--primary);}
.leader-me{background:rgba(245,158,11,0.2);box-shadow:0 0 15px rgba(245,158,11,0.5);border:1px solid rgba(245,158,11,0.6);}
#info-btn{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:pointer;box-shadow:2px 2px 6px var(--shadow), -2px -2px 6px var(--light-shadow);}
#info-modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);z-index:300;}
.modal-content{background:var(--card-bg);color:var(--text);padding:25px;border-radius:20px;width:80%;max-width:320px;text-align:center;box-shadow:6px 6px 15px var(--shadow),
             -6px -6px 15px var(--light-shadow);}
.modal-content button{margin-top:15px;padding:10px 20px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-weight:bold;cursor:pointer;}
.podium{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:10px;
  width: 90%;
  margin:20px 0;
}
.place{
  width:100px;
  border-radius:12px;
  padding:10px;
  color: black;
  text-align:center;
  background:#f3f3f3;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.place.first{ height:170px; background:#fff7cc; }
.place.second{ height:140px; background:#eaeaea; }
.place.third{ height:120px; background:#ffe5cc; }
.place svg{
  width:28px;
  height:28px;
  margin-bottom:6px;
}
.reward{
  font-size:12px;
  color:#666;
}
</style>  
</head>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";import{getDatabase,ref,update,get,child}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";import{getAuth}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";const firebaseConfig={apiKey:"AIzaSyCxfUZl7STcdC53SSogfbVc-4dIijVEbLg",authDomain:"ar-bank-dbfd9.firebaseapp.com",databaseURL:"https://ar-bank-dbfd9-default-rtdb.europe-west1.firebasedatabase.app",projectId:"ar-bank-dbfd9",storageBucket:"ar-bank-dbfd9.firebasestorage.app",messagingSenderId:"635449421773",appId:"1:635449421773:web:bc7261cc5a4238c3649e84"};const app=initializeApp(firebaseConfig);const db=getDatabase(app);
async function checkLeaderboardUpdate(){

setInterval(checkLeaderboardUpdate,5000);const auth=getAuth(app);let score=0,timeLeft=30,currentCurrency='',isGameOver=false,startX=0,gameStarted=false,timerInterval;let multiplier=1,combo=0;const card=document.getElementById('money-card');const scoreEl=document.getElementById('score');const timerEl=document.getElementById('timer');const bestScoreEl=document.getElementById('best-score');const multEl=document.getElementById('multiplier');const zoneUah=document.getElementById('zone-uah');const zoneUsd=document.getElementById('zone-usd');const glare=document.getElementById('card-glare');function startGame(){document.getElementById('start-screen').style.display='none';card.style.display='flex';gameStarted=true;score=0;timeLeft=30;isGameOver=false;multiplier=1;combo=0;scoreEl.textContent=score;timerEl.textContent=timeLeft;if(multEl)multEl.textContent="x1";loadBestScore();spawnBill();startTimer()}window.startGame=startGame;function startTimer(){timerInterval=setInterval(()=>{timeLeft--;timerEl.textContent=timeLeft;if(timeLeft<=0)endGame()},1000)}function spawnBill(){currentCurrency=Math.random()>0.5?'uah':'usd';document.getElementById('bill-value').textContent=currentCurrency==='uah'?'₴500':'$100';card.style.transition='none';card.style.transform='translate(-50%,-50%)';card.style.opacity='1'}card.addEventListener('pointerdown',e=>{if(isGameOver||!gameStarted)return;startX=e.clientX;card.style.transition='none'});window.addEventListener('pointermove',e=>{if(!startX||isGameOver)return;const x=e.clientX-startX;card.style.transform=`translate(calc(-50% + ${x}px), -50%) rotate(${x*0.1}deg)`;glare.style.left=`calc(-50% + ${x*0.5}px)`;if(x<-80){zoneUah.classList.add('hover-uah');zoneUsd.classList.remove('hover-usd')}else if(x>80){zoneUsd.classList.add('hover-usd');zoneUah.classList.remove('hover-uah')}else{zoneUah.classList.remove('hover-uah');zoneUsd.classList.remove('hover-usd')}});window.addEventListener('pointerup',e=>{if(!startX||isGameOver)return;const diff=e.clientX-start
