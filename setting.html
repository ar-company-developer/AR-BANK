<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title id="page_title">Налаштування AR Bank</title><script>(function(){const t=localStorage.getItem('theme');if(t==='dark')document.documentElement.classList.add('dark-mode')})();</script><style>
:root{--primary-color:#4f46e5;--background-color:#f4f7f9;--text-color:#1f2937;--subtle-text-color:#6b7280;--border-color:#e5e7eb;--red-color:#dc2626;--card-background:white;--main-background:#f9fafb;--modal-background:rgba(0,0,0,0.5)}
html.dark-mode{--background-color:#1a1a1a;--text-color:#f0f0f0;--subtle-text-color:#a0a0a0;--border-color:#333333;--card-background:#242424;--main-background:#1a1a1a;--red-color:#f87171}
body{margin:0;padding:0;height:100vh;width:100%;box-sizing:border-box;background-color:var(--background-color);font-family:Arial,sans-serif;transition:background-color .3s}
.container{max-width:420px;margin-left:auto;margin-right:auto;background-color:var(--card-background);min-height:100vh}
.header{padding:24px;background-color:var(--card-background);border-bottom:1px solid var(--border-color);display:flex;align-items:center;gap:16px}
.profile-photo{width:64px;height:64px;background-color:#333333;border-radius:50%;flex-shrink:0;overflow:hidden}
.profile-photo img{width:100%;height:100%;object-fit:cover}
.name{font-size:20px;font-weight:700;color:var(--text-color);margin:0}
.username{font-size:14px;color:var(--subtle-text-color);margin:0}
.main-content{padding:16px;background-color:var(--main-background)}
.section-title{font-size:18px;font-weight:600;color:var(--subtle-text-color);margin-bottom:8px}
.settings-group{border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);overflow:hidden;margin-bottom:24px}
.setting-item{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border-color);background-color:var(--card-background);cursor:pointer}
.setting-label{color:var(--text-color)}
.setting-value{color:var(--subtle-text-color);display:flex;align-items:center;font-size:14px}
.logout .setting-label{color:var(--red-color);font-weight:500}
.icon-arrow,.icon-exit{width:20px;height:20px;color:var(--subtle-text-color);margin-left:4px}
.toggle-switch{position:relative;display:inline-block;width:50px;height:24px}
.toggle-switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:24px}
.slider:before{position:absolute;content:"";height:16px;width:16px;left:4px;bottom:4px;background-color:white;transition:.4s;border-radius:50%}
input:checked+.slider{background-color:var(--primary-color)}
input:checked+.slider:before{transform:translateX(26px)}
.back-button{display:inline-flex;align-items:center;padding:5px 0;margin-left:16px;margin-top:10px;text-decoration:none;color:var(--primary-color);font-weight:500}
.back-button svg{width:20px;height:20px;margin-right:8px;fill:var(--primary-color)}
.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background-color:var(--modal-background)}
.modal-content{background-color:var(--card-background);margin:15% auto;padding:20px;border-radius:12px;max-width:300px;position:relative}
.modal-title{font-size:18px;font-weight:700;margin-bottom:15px;color:var(--text-color);text-align:center}
.profile-data-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-color)}
.data-label{font-size:14px;color:var(--subtle-text-color)}
.data-value{font-size:14px;font-weight:600;color:var(--text-color)}
.close-button{display:block;width:100%;padding:10px;margin-top:15px;background-color:var(--primary-color);color:white;border:none;border-radius:8px;cursor:pointer}
.hidden-helicopter{position:absolute;top:15px;right:15px;cursor:pointer;opacity:.3;transition:all .5s ease;color:var(--text-color);display:none}
.hidden-helicopter:hover{opacity:1;transform:scale(1.2)}
.heli-fly-away{pointer-events:none;transform:translateY(-400px) translateX(200px) rotate(45deg) scale(0)!important;opacity:0!important}
.quest-badge{margin-left:5px;display:none;color:#ff9f43}
</style></head><body>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";import{getDatabase,ref,get,set,runTransaction,onValue}from"https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";const fc={apiKey:"AIzaSyCxfUZl7STcdC53SSogfbVc-4dIijVEbLg",authDomain:"ar-bank-dbfd9.firebaseapp.com",databaseURL:"https://ar-bank-dbfd9-default-rtdb.europe-west1.firebasedatabase.app",projectId:"ar-bank-dbfd9"};const app=initializeApp(fc);const auth=getAuth(app);const db=getDatabase(app);let isH5=false;window.collectHelicopter=async function(i){const u=auth.currentUser;if(!u)return;const e=document.getElementById(`heli-${i}`);if(!e||e.classList.contains('heli-fly-away'))return;e.classList.add('heli-fly-away');try{await set(ref(db,`user/${u.uid}/collected_heli/${i}`),true);await runTransaction(ref(db,`user/${u.uid}/helicopter`),v=>(v||0)+1);setTimeout(()=>e.remove(),600)}catch(x){e.classList.remove('heli-fly-away')}};const dt=document.getElementById('dark-mode-toggle');dt?.addEventListener('change',e=>{document.documentElement.classList.toggle('dark-mode',e.target.checked);localStorage.setItem('theme',e.target.checked?'dark':'light')});document.addEventListener('DOMContentLoaded',()=>{if(localStorage.getItem('theme')==='dark'&&dt)dt.checked=true});onAuthStateChanged(auth,u=>{if(u){onValue(ref(db,`user/${u.uid}/collected_heli/5`),s=>isH5=s.exists()&&s.val()===true);onValue(ref(db,`user/${u.uid}/helicopter`),s=>{if(s.val()>=5)document.getElementById('qBadge').style.display='inline-block'});get(ref(db,`user/${u.uid}`)).then(s=>{if(s.exists()){const d=s.val();document.getElementById('holder_name').textContent=d.card?.holder_name||'No Name';document.getElementById('email').textContent=d.email||'';document.getElementById('profile-data-setting').onclick=()=>{document.getElementById('modalEmail').textContent=d.email;document.getElementById('modalFullName').textContent=d.full_name;document.getElementById('modalUsername').textContent=d.username;document.getElementById('profileModal').style.display='block';const h5=document.getElementById('heli-5');if(h5)h5.style.display=isH5?'none':'block'}}})}else{window.location.href="welcome.html"}});document.getElementById('logout-button').onclick=()=>signOut(auth).then(()=>window.location.href="welcome.html");
</script></body></html>
