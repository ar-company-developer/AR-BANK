<script>(function(){const t=localStorage.getItem('theme');if(t==='dark'){document.documentElement.classList.add('dark-mode')}else{document.documentElement.classList.remove('dark-mode')}})();</script>
<script type="module" src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js"></script>

<style>
:root{--background-color:#ffffff;--card-background:#f9f9f9;--button-pay:#dc3545;--button-text:#ffffff;--text-color:#333333;--secondary-text:#777;--accent-color:#2e86de;--back-button-bg:#f0f0f0;--shadow-color:rgba(0,0,0,0.05)}
html.dark-mode{--background-color:#121212;--card-background:#1e1e1e;--button-pay:#e74c3c;--button-text:#ffffff;--text-color:#f0f0f0;--secondary-text:#aaaaaa;--accent-color:#7986cb;--back-button-bg:#282828;--shadow-color:rgba(0,0,0,0.3)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background-color:var(--background-color);margin:0;padding:0;color:var(--text-color);display:flex;flex-direction:column;align-items:center;min-height:100vh;transition:background-color .3s,color .3s}
.container{width:90%;max-width:390px;padding:20px}
.header{display:flex;align-items:center;justify-content:flex-start;padding:10px 0 30px}
.back-button-circle{width:40px;height:40px;background-color:var(--back-button-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-right:20px;transition:background-color .3s;position:relative}
.back-button-circle svg{width:20px;height:20px;fill:var(--text-color)}
.title{font-size:24px;font-weight:700;text-align:center;flex-grow:1;margin-left:-60px;color:var(--text-color)}
#finesList{display:flex;flex-direction:column;gap:15px;padding-bottom:20px}
.fine-card{background-color:var(--card-background);border-radius:12px;padding:15px;box-shadow:0 4px 10px var(--shadow-color);display:flex;justify-content:space-between;align-items:center}
.fine-sum{font-size:18px;color:var(--button-pay);font-weight:700}
.pay-button{padding:8px 15px;background-color:var(--button-pay);color:var(--button-text);border:none;border-radius:10px;font-weight:600;cursor:pointer}
.pay-button:disabled{background-color:#b0b0b0;cursor:not-allowed}
#balanceInfo,#statusMessage{font-size:14px;color:var(--accent-color);margin-bottom:20px;text-align:center}
#errorMessage{font-size:14px;color:var(--button-pay);text-align:center;margin-bottom:20px}
.no-fines-message{text-align:center;color:var(--secondary-text);margin-top:50px}
.hidden-helicopter{position:absolute;bottom:2px;right:2px;cursor:pointer;z-index:10;opacity:.05;transition:all .5s ease;color:var(--text-color);display:none}
.hidden-helicopter:hover{opacity:.8;transform:scale(1.4) rotate(-10deg)}
.heli-fly-away{pointer-events:none;transform:translateY(-400px) translateX(200px) rotate(45deg) scale(0)!important;opacity:0!important}
</style>
</head>
<body>
<div class="container">

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";import{getDatabase,ref,runTransaction,onValue,push,remove,get,set}from"https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";const c={apiKey:"AIzaSyCxfUZl7STcdC53SSogfbVc-4dIijVEbLg",authDomain:"ar-bank-dbfd9.firebaseapp.com",databaseURL:"https://ar-bank-dbfd9-default-rtdb.europe-west1.firebasedatabase.app",projectId:"ar-bank-dbfd9"};const a=initializeApp(c);const d=getDatabase(a);const h=getAuth(a);const AD="4472473724933732";let sB=0,sU=null,rU=null;window.collectHelicopter=async function(i){const u=h.currentUser;if(!u)return;const e=document.getElementById(`heli-${i}`);if(!e||e.classList.contains('heli-fly-away'))return;e.classList.add('heli-fly-away');try{await set(ref(d,`user/${u.uid}/collected_heli/${i}`),true);await runTransaction(ref(d,`user/${u.uid}/helicopter`),v=>((v||0)+1));setTimeout(()=>e.remove(),600)}catch(x){e.classList.remove('heli-fly-away')}};function lB(u){onValue(ref(d,`user/${u}/card/balance`),s=>{sB=Number(s.val())||0;document.getElementById('balanceInfo').textContent=`Ваш поточний баланс: ${sB.toFixed(2)} €`})}async function fA(){try{const s=await get(ref(d,`cards_index/${AD}`));if(s.exists()&&s.val().uid){rU=s.val().uid;return rU}}catch(e){return null}}async function hP(k,m,desc,b){if(!sU||!rU)return;b.disabled=true;if(m>sB||m<=0){b.disabled=false;return}try{const r=await runTransaction(ref(d,`user/${sU}/card/balance`),c=>{const v=Number(c)||0;if(v>=m)return parseFloat((v-m).toFixed(2))});if(r.committed){await runTransaction(ref(d,`user/${rU}/card/balance`),c=>parseFloat(((Number(c)||0)+m).toFixed(2)));await push(ref(d,`user/${sU}/card/history`),{amount:-m,description:`Оплата штрафу: ${desc}`,timestamp:Date.now(),currency:"€"});await remove(ref(d,`user/${sU}/fine/${k}`));b.textContent='Сплачено'}else{b.disabled=false}}catch(e){b.disabled=false}}function rF(k,f){const s=Number(f.sum)||0,ds=f.description||'Штраф',c=document.createElement('div');c.className='fine-card';c.innerHTML=`<div class="fine-details"><div>${ds}</div><div class="fine-sum">${s.toFixed(2)} €</div></div><button class="pay-button">Сплатити</button>`;c.querySelector('.pay-button').onclick=e=>hP(k,s,ds,e.target);document.getElementById('finesList').appendChild(c)}onAuthStateChanged(h,async(u)=>{if(u){sU=u.uid;await fA();document.getElementById('statusMessage').style.display='none';document.getElementById('finesContent').style.display='block';lB(u.uid);onValue(ref(d,`user/${u.uid}/fine`),s=>{const f=s.val();const l=document.getElementById('finesList');l.innerHTML='';if(f){document.getElementById('noFines').style.display='none';Object.keys(f).forEach(k=>rF(k,f[k]))}else{document.getElementById('noFines').style.display='block'}});onValue(ref(d,`user/${u.uid}/collected_heli/3`),s=>{if(!s.val()){document.getElementById('heli-3').style.display='block'}})}else{document.getElementById('statusMessage').innerHTML='Ви не увійшли.'}});
</script>
